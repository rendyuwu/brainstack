name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: noa
          POSTGRES_PASSWORD: noa
          POSTGRES_DB: brainstack
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Unit tests
        run: pnpm test --run
        env:
          DATABASE_URL: postgresql://noa:noa@localhost:5432/brainstack

      - name: Push database schema
        run: pnpm drizzle-kit push
        env:
          DATABASE_URL: postgresql://noa:noa@localhost:5432/brainstack

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://noa:noa@localhost:5432/brainstack
          AUTH_SECRET: ci-test-secret-key-minimum-32-chars
          AUTH_TRUST_HOST: "true"
